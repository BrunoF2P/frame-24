services:
  postgres:
    image: postgres:18.3-alpine
    container_name: frame24-postgres
    environment:
      POSTGRES_USER: frame24
      POSTGRES_PASSWORD: frame24pass
      POSTGRES_DB: frame24
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - frame24-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frame24"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-postgres:
    image: postgres:16-alpine
    container_name: frame24-authentik-postgres
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentikpass
      POSTGRES_DB: authentik
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    networks:
      - frame24-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: frame24-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - frame24-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-S", "http://localhost:8025/livez"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: frame24-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: frame24
      RABBITMQ_DEFAULT_PASS: frame24pass
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - frame24-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: frame24-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: frame24
      MINIO_ROOT_PASSWORD: frame24pass
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # API S3
      - "9001:9001"  # Painel web
    volumes:
      - minio_data:/data
    networks:
      - frame24-network

  authentik:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: frame24-authentik
    restart: unless-stopped
    command: server
    depends_on:
      authentik-postgres:
        condition: service_healthy
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentikpass
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_SECRET_KEY: change-me-to-a-long-random-authentik-secret
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@frame24.local
      AUTHENTIK_BOOTSTRAP_PASSWORD: admin
      AUTHENTIK_BOOTSTRAP_TOKEN: frame24-authentik-bootstrap-token
    ports:
      - "9080:9000"
      - "9444:9443"
    shm_size: 512mb
    volumes:
      - authentik_data:/data
      - authentik_templates:/templates
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - frame24-network

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: frame24-authentik-worker
    restart: unless-stopped
    command: worker
    depends_on:
      authentik-postgres:
        condition: service_healthy
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentikpass
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_SECRET_KEY: change-me-to-a-long-random-authentik-secret
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@frame24.local
      AUTHENTIK_BOOTSTRAP_PASSWORD: admin
      AUTHENTIK_BOOTSTRAP_TOKEN: frame24-authentik-bootstrap-token
    shm_size: 512mb
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - authentik_data:/data
      - authentik_certs:/certs
      - authentik_templates:/templates
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - frame24-network

  authentik-bootstrap:
    image: node:22-alpine
    container_name: frame24-authentik-bootstrap
    depends_on:
      - authentik
      - authentik-worker
    restart: on-failure
    working_dir: /bootstrap
    command: ["node", "/bootstrap/bootstrap-authentik.mjs"]
    environment:
      AUTHENTIK_URL: http://authentik:9000
      AUTHENTIK_TOKEN: frame24-authentik-bootstrap-token
      FRAME24_OIDC_CLIENT_ID: frame24-app
      FRAME24_OIDC_CLIENT_SECRET: frame24-app-dev-secret
      FRAME24_WEB_URL: http://localhost:3000
      FRAME24_ADMIN_URL: http://localhost:3004
      FRAME24_LANDING_URL: http://localhost:3003
      FRAME24_WEB_INTERNAL_URL: http://host.docker.internal:3000
      FRAME24_ADMIN_INTERNAL_URL: http://host.docker.internal:3004
      FRAME24_LANDING_INTERNAL_URL: http://host.docker.internal:3003
    volumes:
      - ./scripts/bootstrap-authentik.mjs:/bootstrap/bootstrap-authentik.mjs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - frame24-network

volumes:
  postgres_data:
  authentik_postgres_data:
  rabbitmq_data:
  minio_data:
  authentik_data:
  authentik_certs:
  authentik_templates:

networks:
  frame24-network:
    driver: bridge
